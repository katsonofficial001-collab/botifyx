<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botify X — Sign in</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at top, #1a1f2e 0%, #0a0d14 100%);
    color: #e6e8eb;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #141821;
    border: 1px solid #232838;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .brand {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin: 0 0 6px;
    background: linear-gradient(135deg, #22c55e, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub { color: #8b94a7; margin: 0 0 28px; font-size: 14px; }
  label { display: block; font-size: 12px; color: #8b94a7; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.8px; }
  input {
    width: 100%;
    padding: 12px 14px;
    background: #0d1018;
    color: #e6e8eb;
    border: 1px solid #232838;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    transition: border 0.15s;
  }
  input:focus { border-color: #22c55e; }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #06120a;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  button:hover { filter: brightness(1.05); }
  .err {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .foot { margin-top: 24px; text-align: center; font-size: 12px; color: #5b6478; }
</style>
</head>
<body>
  <div class="card">
    <h1 class="brand">Botify X</h1>
    <p class="sub">Sign in to your dashboard</p>
    <form method="POST" action="/login">
      {{error}}
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
    <div class="foot">Botify X v1.0.0</div>
  </div>
</body>
</html>
